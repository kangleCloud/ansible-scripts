- name: Reload systemd manager configuration
  command: systemctl daemon-reload
  become: true

- name: Enable Prometheus Node Exporter Service
  systemd:
    name: prometheus_node_exporter.service
    enabled: yes
  become: true
  
- name: Start Prometheus Node Exporter Service
  systemd:
    name: prometheus_node_exporter.service
    state: started
  become: true

- name: Verify Prometheus Node Exporter Service Status
  systemd:
    name: prometheus_node_exporter.service
    state: started
  register: node_exporter_service_status
  failed_when: not node_exporter_service_status.status.ActiveState == "active"
  become: true