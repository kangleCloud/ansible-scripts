---
- name: Ensure node_exporter source directory exists
  ansible.builtin.file:
    path: "{{ NODE_EXPORTER_STAGE_PATH }}"
    state: directory
    mode: "0755"

- name: Ensure node_exporter install parent directory exists
  ansible.builtin.file:
    path: "{{ NODE_EXPORTER_INSTALL_PATH | dirname }}"
    state: directory
    mode: "0755"

- name: Check node_exporter archive on remote host
  ansible.builtin.stat:
    path: "{{ SOFTWARE_PATH }}/{{ NODE_EXPORTER_SRC_ARCHIVE }}"
  register: node_exporter_archive

- name: Fail when node_exporter archive is missing
  ansible.builtin.fail:
    msg: >-
      Missing archive {{ SOFTWARE_PATH }}/{{ NODE_EXPORTER_SRC_ARCHIVE }}.
      Upload the node_exporter package to the remote host before running this playbook.
  when: not node_exporter_archive.stat.exists

- name: Check installed node_exporter version
  ansible.builtin.command:
    cmd: "{{ NODE_EXPORTER_INSTALL_PATH }}/node_exporter --version"
  register: node_exporter_version_check
  changed_when: false
  failed_when: false

- name: Install node_exporter from remote archive
  when: >-
    node_exporter_version_check.rc != 0 or
    ('version ' ~ NODE_EXPORTER_VERSION) not in
    ((node_exporter_version_check.stdout | default('')) ~ ' ' ~ (node_exporter_version_check.stderr | default('')))
  block:
    - name: Remove old node_exporter extract directory
      ansible.builtin.file:
        path: "{{ NODE_EXPORTER_STAGE_PATH }}/{{ NODE_EXPORTER_SRC }}"
        state: absent

    - name: Extract node_exporter archive
      ansible.builtin.unarchive:
        src: "{{ SOFTWARE_PATH }}/{{ NODE_EXPORTER_SRC_ARCHIVE }}"
        dest: "{{ NODE_EXPORTER_STAGE_PATH }}"
        remote_src: true

    - name: Remove existing node_exporter install directory
      ansible.builtin.file:
        path: "{{ NODE_EXPORTER_INSTALL_PATH }}"
        state: absent

    - name: Move node_exporter to install path
      ansible.builtin.command:
        cmd: mv "{{ NODE_EXPORTER_STAGE_PATH }}/{{ NODE_EXPORTER_SRC }}" "{{ NODE_EXPORTER_INSTALL_PATH }}"

- name: Ensure node_exporter binary is executable
  ansible.builtin.file:
    path: "{{ NODE_EXPORTER_INSTALL_PATH }}/node_exporter"
    owner: root
    group: root
    mode: "0755"

