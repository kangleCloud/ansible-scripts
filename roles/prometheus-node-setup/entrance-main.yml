# 此文件为ansible-playbook入口文件
# ansible-playbook entrance-main.yml
---
- name: Prometheus Node Setup Playbook
  hosts: node_exporter
  remote_user: root
  gather_facts: yes
  become: yes
  become_method: sudo
  vars:
    SOFTWARE_PATH: "/root/asb_pkgs"
    LINUX_SRC_PATH: "/usr/local/src"
    LINUX_INSTALL_PATH: "/usr/local"
    node_exporter: true
  
  pre_tasks:
    - name: Ensure software directory exists
      ansible.builtin.file:
        path: "{{ SOFTWARE_PATH }}"
        state: directory
        mode: "0755"
      tags: always

  roles:
    - role: node_exporter
      tags: ["monitoring", "prometheus"]

    - role: nginx_exporter
      when: install_nginx_exporter | default(false)
      tags: ["monitoring", "prometheus"]
